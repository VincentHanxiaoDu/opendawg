server:
  port: 4096
  hostname: 127.0.0.1
plugins:
  config-cli:
    enabled: true
    execution_mode: docker
    config:
      port: 9200
      token: ${vault:config_cli_token}
  graphiti-memory:
    enabled: true
    execution_mode: docker
    config:
      port: 8000
      neo4j_http_port: 7474
      neo4j_bolt_port: 7687
      neo4j_password: ${vault:neo4j_password}
      azure_openai_api_key: ${vault:azure_openai_api_key}
      azure_openai_endpoint: ${vault:azure_openai_endpoint}
      azure_openai_deployment: gpt-4.1
      azure_openai_api_version: 2025-03-01-preview
      azure_openai_embeddings_deployment: text-embedding-3-large
      azure_openai_embeddings_endpoint: ${vault:azure_openai_embeddings_endpoint}
  cron-scheduler:
    enabled: true
    execution_mode: native
    config:
      port: 3012
      base_url: http://localhost:3012
      api_key: ${vault:cronicle_api_key}
      secret: ${vault:cronicle_secret}
      admin_password: ${vault:cronicle_admin_password}
  opendawg-agent:
    enabled: true
    execution_mode: native
    config: {}
  mcp-cli:
    enabled: true
    execution_mode: native
    config: {}
  openspec:
    enabled: true
    execution_mode: native
    config: {}
  channel-telegram:
    enabled: true
    execution_mode: docker
    config:
      bot_token: REDACTED_BOT_TOKEN_2
      allowed_user_ids: "7930109134"
      admin_user_id: "7930109134"
      message_delete_timeout: 0
      server_urls: ""
      server_url: http://host.docker.internal:4096
      media_dir: ~/opendawg/media/telegram
      voice_api_version: 2024-06-01
      voice_stt_deployment: whisper
      voice_tts_deployment: tts
      voice_tts_voice: alloy
  channel-discord:
    enabled: true
    execution_mode: docker
    config:
      bot_token: ${vault:discord_bot_token}
      app_id: ""
      allowed_user_ids: ""
      admin_user_id: ""
      message_delete_timeout: 0
      server_urls: ""
      server_url: http://localhost:4096
      media_dir: ~/opendawg/media/discord
  tmux-tty:
    enabled: true
    config: {}
