# Standalone docker-compose for cron-scheduler skill.
# For use outside the root project docker-compose.
# Usage: docker compose up -d
services:
  cronicle:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CRONICLE_PORT:-3012}:3012"
    environment:
      - CRONICLE_API_KEY=${CRONICLE_API_KEY:-}
      - CRONICLE_SECRET=${CRONICLE_SECRET:-}
      - CRONICLE_BASE_URL=${CRONICLE_BASE_URL:-http://localhost:3012}
      - CRONICLE_ADMIN_PASSWORD=${CRONICLE_ADMIN_PASSWORD:-admin}
    volumes:
      - cronicle_data:/opt/cronicle/data
      - cronicle_logs:/opt/cronicle/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3012/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: on-failure

volumes:
  cronicle_data:
  cronicle_logs:
