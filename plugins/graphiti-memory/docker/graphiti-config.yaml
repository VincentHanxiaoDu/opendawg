# Graphiti MCP Server — Azure OpenAI + external Neo4j
# Mounted into container at /app/mcp/config/config.yaml

server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "azure_openai"
  model: "${AZURE_OPENAI_DEPLOYMENT:gpt-4.1}"
  max_tokens: 4096

  providers:
    azure_openai:
      api_key: "${AZURE_OPENAI_API_KEY}"
      api_url: "${AZURE_OPENAI_ENDPOINT}"
      api_version: "${AZURE_OPENAI_API_VERSION:2025-03-01-preview}"
      deployment_name: "${AZURE_OPENAI_DEPLOYMENT}"

embedder:
  provider: "azure_openai"
  model: "${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT:text-embedding-3-large}"
  dimensions: 3072

  providers:
    azure_openai:
      api_key: "${AZURE_OPENAI_API_KEY}"
      api_url: "${AZURE_OPENAI_EMBEDDINGS_ENDPOINT}"
      api_version: "${AZURE_OPENAI_API_VERSION:2025-03-01-preview}"
      deployment_name: "${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT}"

database:
  provider: "neo4j"

  providers:
    neo4j:
      uri: "${NEO4J_URI:bolt://neo4j:7687}"
      username: "${NEO4J_USER:neo4j}"
      password: "${NEO4J_PASSWORD:graphiti}"
      database: "${NEO4J_DATABASE:neo4j}"

graphiti:
  group_id: "${GRAPHITI_GROUP_ID:main}"
  user_id: "${USER_ID:mcp_user}"
