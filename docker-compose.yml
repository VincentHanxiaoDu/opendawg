  #     dockerfile: Dockerfile
  #   ports:
  #     - "${CRONICLE_PORT:-3012}:3012"
  #   environment:
  #     - CRONICLE_API_KEY=${CRONICLE_API_KEY:-}
  #     - CRONICLE_SECRET=${CRONICLE_SECRET:-}
  #     - CRONICLE_BASE_URL=${CRONICLE_BASE_URL:-http://localhost:3012}
  #     - CRONICLE_ADMIN_PASSWORD=${CRONICLE_ADMIN_PASSWORD:-admin}
  #   volumes:
  #     - cronicle_data:/opt/cronicle/data
  #     - cronicle_logs:/opt/cronicle/logs
  #   profiles:
  #     - cron
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:3012/"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 12
  #     start_period: 60s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M
  #   restart: on-failure

  # ============================================================
  # Channel — Telegram (opencode-telegram, pure client)
  #   Activated by: --channel=telegram or --start-all
  #
  # NOTE: Uses network_mode: "host" so the container shares the
  # host network stack. This enables VPN/overlay networking from
  # the host to reach opencode servers on remote machines.
  #
  # macOS limitation: Docker Desktop on macOS runs containers in a
  # Linux VM, so host networking behaves differently. On macOS,
  # OPENCODE_SERVER_URLS may need to point to the VM gateway
  # (e.g., host.docker.internal) instead of localhost.
  # ============================================================
  channel-telegram:
    build:
      context: .
      dockerfile: Dockerfile.channel-telegram
    network_mode: "host"
    environment:
      # Map our env var names → telegramcoder expected names
      - TELEGRAM_BOT_TOKENS=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}
      - ADMIN_USER_ID=${ADMIN_USER_ID:-}
      - MESSAGE_DELETE_TIMEOUT=${TELEGRAM_MESSAGE_DELETE_TIMEOUT:-0}
      # OPENCODE_SERVER_URLS: comma-separated list of servers, format: url|name|username|password
      # With host networking, localhost reaches the host machine directly (Linux).
      # Fallback: OPENCODE_SERVER_URL (single server, legacy)
      - OPENCODE_SERVER_URLS=${OPENCODE_SERVER_URLS:-}
      - OPENCODE_SERVER_URL=${OPENCODE_SERVER_URL:-http://localhost:4096}
      # HTTP Basic Auth credentials — forwarded from opencode server config so the bot
      # can authenticate against a password-protected opencode server automatically.
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - MEDIA_TMP_LOCATION=${OPENDAWG_MEDIA_DIR:-${HOME}/opendawg/media}/telegram
    volumes:
      - channel_data:/data
      - ${OPENDAWG_MEDIA_DIR:-${HOME}/opendawg/media}/telegram:${OPENDAWG_MEDIA_DIR:-${HOME}/opendawg/media}/telegram
    profiles:
      - telegram
    deploy:
      resources:
        limits:
          memory: 128M
    restart: on-failure

  # ============================================================
  # Channel — Discord (opencode-discord, pure client)
  #   Activated by: --channel=discord or --start-all
  # ============================================================
  channel-discord:
    build:
      context: .
      dockerfile: Dockerfile.channel-discord
    network_mode: "host"
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APP_ID=${DISCORD_APP_ID:-}
      - ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS:-}
      - ADMIN_USER_ID=${DISCORD_ADMIN_USER_ID:-}
      - MESSAGE_DELETE_TIMEOUT=${DISCORD_MESSAGE_DELETE_TIMEOUT:-0}
      - OPENCODE_SERVER_URLS=${OPENCODE_SERVER_URLS:-}
      - OPENCODE_SERVER_URL=${OPENCODE_SERVER_URL:-http://localhost:4096}
      # HTTP Basic Auth credentials — forwarded from opencode server config.
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - MEDIA_TMP_LOCATION=${OPENDAWG_MEDIA_DIR:-${HOME}/opendawg/media}/discord
    volumes:
      - channel_discord_data:/data
      - ${OPENDAWG_MEDIA_DIR:-${HOME}/opendawg/media}/discord:${OPENDAWG_MEDIA_DIR:-${HOME}/opendawg/media}/discord
    profiles:
      - discord
    deploy:
      resources:
        limits:
          memory: 128M
    restart: on-failure

volumes:
  neo4j_data:
  config_vault:
  channel_data:
  channel_discord_data:
  # cronicle_data:    # Deprecated: Cronicle runs on host now
  # cronicle_logs:    # Deprecated: Cronicle runs on host now
