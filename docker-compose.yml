services:
  # ============================================================
  # Graphiti — Knowledge Graph (long-term memory)
  #   Activated by: --graphiti or --start-all
  # ============================================================
  neo4j:
    image: neo4j:5.26.2
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-graphiti}
      - NEO4J_server_memory_heap_initial__size=128m
      - NEO4J_server_memory_heap_max__size=256m
      - NEO4J_server_memory_pagecache_size=64m
    volumes:
      - neo4j_data:/data
    profiles:
      - graphiti
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure

  graphiti:
    image: zepai/knowledge-graph-mcp
    ports:
      - "${GRAPHITI_PORT:-8000}:8000"
    environment:
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2025-03-01-preview}
      - AZURE_OPENAI_EMBEDDINGS_ENDPOINT=${AZURE_OPENAI_EMBEDDINGS_ENDPOINT:-${AZURE_OPENAI_ENDPOINT}}
      - AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT=${AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT:-text-embedding-3-large}
      # Reranker (cross_encoder) falls back to default OpenAI client — point it to Azure
      - OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - OPENAI_BASE_URL=${AZURE_OPENAI_ENDPOINT}openai/
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-graphiti}
    volumes:
      - ./graphiti-config.yaml:/app/mcp/config/config.yaml:ro
      - ./graphiti-factories-patch.py:/app/mcp/src/services/factories.py
    profiles:
      - graphiti
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: on-failure

  # ============================================================
  # Config-CLI — Vault (serves secrets via HTTP for remote agents)
  #   Activated by: --config-cli or --start-all
  # ============================================================
  config-cli:
    build:
      context: .
      dockerfile: Dockerfile.config-cli
    ports:
      - "${CONFIG_CLI_PORT:-9100}:9100"
    environment:
      - CONFIG_CLI_TOKEN=${CONFIG_CLI_TOKEN}
      - CONFIG_CLI_PORT=9100
    volumes:
      - config_vault:/data/vault
    profiles:
      - config-cli
    healthcheck:
      test: ["CMD", "bash", "-c", "echo -e 'GET /health HTTP/1.0\r\n\r\n' | socat - TCP:localhost:9100 | grep -q ok"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: on-failure

  # ============================================================
  # Cron Scheduler — Cronicle
  #   DEPRECATED: Cronicle now runs as a host-native systemd service
  #   instead of Docker. Use 'cron-cli start' to manage.
  #   The Docker service definition is kept for reference only.
  # ============================================================
  # cronicle:
